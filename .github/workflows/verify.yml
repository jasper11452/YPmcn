name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            YPmcn/package-lock.json
      - uses: astral-sh/setup-uv@v6
      - run: npm ci
      - run: npm ci --prefix YPmcn
      - run: npm run verify
